<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>a2ui surface host bridge</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
  header {
    padding: 8px 16px;
    border-bottom: 1px solid #d0d0d0;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }
  @media (prefers-color-scheme: dark) { header { border-color: #333; } }
  header h1 { font-size: 13px; margin: 0; font-weight: 600; }
  header label { font-size: 12px; color: #666; display: flex; gap: 6px; align-items: center; }
  header input[type="text"] {
    font: inherit; padding: 4px 8px; border-radius: 4px;
    border: 1px solid #d0d0d0; background: transparent; color: inherit;
    min-width: 280px;
  }
  header button { font: inherit; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  .status { margin-left: auto; font-size: 12px; }
  .status.ok { color: #2e7d32; }
  .status.err { color: #b00020; }
  iframe { flex: 1; border: none; width: 100%; }
  .log {
    height: 140px;
    overflow: auto;
    background: rgba(0,0,0,0.04);
    padding: 6px 12px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    border-top: 1px solid #d0d0d0;
    flex-shrink: 0;
  }
  @media (prefers-color-scheme: dark) {
    .log { background: rgba(255,255,255,0.04); border-color: #333; }
  }
  .log .req { color: #0066cc; }
  .log .res { color: #2e7d32; }
  .log .err { color: #b00020; }
  .backend-empty {
    padding: 10px 16px; background: #fff8e1; border-bottom: 1px solid #f0c040;
    color: #6b4500; font-size: 13px; display: flex; gap: 12px; align-items: center;
    flex-wrap: wrap;
  }
  @media (prefers-color-scheme: dark) {
    .backend-empty { background: #3a2e10; border-color: #806020; color: #f0c060; }
  }
  .backend-empty strong { color: inherit; }
  .backend-empty .opts { display: flex; gap: 6px; margin-left: auto; }
  .backend-empty button {
    font: inherit; padding: 3px 10px; border-radius: 4px; cursor: pointer;
    background: #fff; border: 1px solid #c89030; color: #6b4500;
  }
  @media (prefers-color-scheme: dark) {
    .backend-empty button { background: #2a2208; border-color: #806020; color: #f0c060; }
  }
  .backend-empty button:hover { filter: brightness(1.05); }
  .backend-empty.hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>host bridge</h1>
  <label>renderer: <input type="text" id="renderer-url" value="./index.html?demo=1"></label>
  <label>backend: <input type="text" id="backend-url" placeholder="http://localhost:PORT or 'mock'"></label>
  <button id="reload">reload</button>
  <span class="status" id="status">unconfigured</span>
</header>

<div class="backend-empty hidden" id="backend-empty-banner">
  <span><strong>No backend configured.</strong> Surface actions like "Open chunk" have nowhere to route — they will return an error. Configure one of:</span>
  <div class="opts">
    <button id="banner-mock">Try mock (stub responses)</button>
    <button id="banner-focus">Enter sidecar URL…</button>
  </div>
</div>

<iframe id="frame" sandbox="allow-scripts allow-same-origin" src="./index.html?demo=1"></iframe>

<div class="log" id="log"></div>

<script type="module">
const CFG_KEY = 'a2ui-host-bridge.v1';
const TRUST_KEY = 'a2ui-trust-store.v1';
const cfg = JSON.parse(localStorage.getItem(CFG_KEY) || '{}');

// ---- Trust gate (RDR-004) ---------------------------------------------
//
// Inline copy of palinex.signing.verify_payload + ReplayCache. The
// canonical reference impl is in web/trust-gate.html; tests assert these
// two files declare the same primitives. Inlining is per the
// html-tool-patterns "one-file" discipline — each tool is independently
// runnable without imports.

const TG_ALGORITHM = 'Ed25519';
const TG_REQUIRED = ['producerId','publicKey','algorithm','actions','issuedAt','expiresAt','nonce','signature'];
const TG_SKEW_MS = 60_000;
function tgB64uEnc(bytes) {
  // Loop instead of spread — spread of Uint8Array crashes engines at ~65k elements.
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function tgB64uDec(s) {
  s = s.replace(/-/g,'+').replace(/_/g,'/'); while (s.length % 4) s += '=';
  const bin = atob(s); const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
function tgJcs(v) {
  if (v === null) return 'null';
  const t = typeof v;
  if (t === 'boolean') return v ? 'true' : 'false';
  if (t === 'number') { if (!Number.isFinite(v)) throw new Error('non-finite number'); return String(v); }
  if (t === 'string') return JSON.stringify(v);
  if (Array.isArray(v)) return '[' + v.map(tgJcs).join(',') + ']';
  if (t === 'object') {
    const k = Object.keys(v).sort();
    return '{' + k.map(x => JSON.stringify(x) + ':' + tgJcs(v[x])).join(',') + '}';
  }
  throw new Error('unsupported type: ' + t);
}
async function tgFingerprint(pubkeyBytes) {
  const d = await crypto.subtle.digest('SHA-256', pubkeyBytes);
  return 'k_' + tgB64uEnc(new Uint8Array(d));
}
let _tgNoble = null;
async function tgEd25519Verify(pub, sig, msg) {
  try {
    const key = await crypto.subtle.importKey('raw', pub, { name: 'Ed25519' }, false, ['verify']);
    return await crypto.subtle.verify('Ed25519', key, sig, msg);
  } catch (_) {
    if (!_tgNoble) _tgNoble = await import('https://cdn.jsdelivr.net/npm/@noble/ed25519@2.1.0/+esm');
    return await _tgNoble.verifyAsync(sig, msg, pub);
  }
}
class TrustError extends Error { constructor(msg, kind) { super(msg); this.kind = kind; } }
async function tgVerifyPayload(payload, { now } = {}) {
  if (!payload || typeof payload !== 'object' || Array.isArray(payload)) throw new TrustError('payload must be object', 'malformed');
  if (!('trust' in payload)) throw new TrustError('payload has no `trust` block', 'malformed');
  const trust = payload.trust;
  if (!trust || typeof trust !== 'object' || Array.isArray(trust)) throw new TrustError('`trust` must be object', 'malformed');
  const missing = TG_REQUIRED.filter(f => !(f in trust));
  if (missing.length) throw new TrustError(`trust missing: ${missing.join(', ')}`, 'malformed');
  if (trust.algorithm !== TG_ALGORITHM) throw new TrustError(`unsupported algorithm: ${trust.algorithm}`, 'malformed');
  const pub = tgB64uDec(trust.publicKey);
  const expectedId = await tgFingerprint(pub);
  if (trust.producerId !== expectedId) throw new TrustError(`producerId mismatch: got ${trust.producerId}, expected ${expectedId}`, 'identity');
  const sig = tgB64uDec(trust.signature);
  const trustNoSig = { ...trust }; delete trustNoSig.signature;
  const payloadNoSig = { ...payload, trust: trustNoSig };
  const msg = new TextEncoder().encode(tgJcs(payloadNoSig));
  const ok = await tgEd25519Verify(pub, sig, msg);
  if (!ok) throw new TrustError('Ed25519 signature verification failed', 'signature');
  const nowMs = (now instanceof Date ? now : new Date()).getTime();
  const expiresMs = Date.parse(trust.expiresAt);
  const issuedMs = Date.parse(trust.issuedAt);
  if (Number.isNaN(issuedMs) || Number.isNaN(expiresMs)) throw new TrustError('invalid RFC 3339 timestamp', 'malformed');
  if (nowMs > expiresMs) throw new TrustError(`expired: expiresAt=${trust.expiresAt}`, 'freshness');
  if (issuedMs > nowMs + TG_SKEW_MS) throw new TrustError(`issued in future: issuedAt=${trust.issuedAt}`, 'freshness');
  return trust;
}
class ReplayCache {
  constructor() { this._seen = new Map(); }
  checkAndRecord(producerId, nonce, expiresAt) {
    const nowMs = Date.now();
    for (const [k, exp] of this._seen) { if (exp < nowMs) this._seen.delete(k); }
    const key = producerId + '\0' + nonce;
    if (this._seen.has(key)) return false;
    this._seen.set(key, expiresAt instanceof Date ? expiresAt.getTime() : Date.parse(expiresAt));
    return true;
  }
  get size() { return this._seen.size; }
}
const replayCache = new ReplayCache();
let verifiedTrust = null;     // set after successful loadSurface verify
let verifiedActions = null;   // intersected actions list, ready for handleRequest gating
function loadTrustStore() {
  try { return JSON.parse(localStorage.getItem(TRUST_KEY) || '{}'); }
  catch (_) { return {}; }
}
function trustStoreAllowedActions(store, producerId) {
  const entry = store?.keys?.[producerId];
  if (!entry) return null;
  // RDR-004 §Item 5 / §Item 6: a key past its valid_until is rotated out.
  // Treat as unknown — falls through to default_policy.
  if (entry.valid_until) {
    const expiresMs = Date.parse(entry.valid_until);
    if (!Number.isNaN(expiresMs) && expiresMs < Date.now()) {
      return null;
    }
  }
  return entry.allowed_actions || null;
}
function trustStoreDefaultPolicy(store) {
  return store?.default_policy || 'log-only';
}
function intersect(a, b) { return a.filter(x => b.includes(x)); }
async function trustGateCheck(payload) {
  const store = loadTrustStore();
  if (!('trust' in payload)) {
    const policy = trustStoreDefaultPolicy(store);
    logLine(policy === 'deny' ? 'err' : 'req', `trust: unsigned payload (default_policy=${policy})`);
    return { verified: null, allowedActions: null, policy };
  }
  const trust = await tgVerifyPayload(payload);  // throws TrustError on failure
  const storeActions = trustStoreAllowedActions(store, trust.producerId);
  if (storeActions === null) {
    const policy = trustStoreDefaultPolicy(store);
    logLine('err', `trust: unknown producer ${trust.producerId.slice(0,12)}… (default_policy=${policy})`);
    return { verified: trust, allowedActions: null, policy };
  }
  if (!replayCache.checkAndRecord(trust.producerId, trust.nonce, trust.expiresAt)) {
    throw new TrustError('replay detected — payload nonce already seen this session', 'replay');
  }
  const allowed = intersect(trust.actions, storeActions);
  logLine('res', `trust: verified ${trust.producerName || trust.producerId.slice(0,12)+'…'} · actions=${allowed.join(',') || '<empty>'}`);
  return { verified: trust, allowedActions: allowed, policy: 'verified' };
}

const frame = document.getElementById('frame');
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const rendererInput = document.getElementById('renderer-url');
const backendInput = document.getElementById('backend-url');

if (cfg.rendererUrl) rendererInput.value = cfg.rendererUrl;
if (cfg.backendUrl) backendInput.value = cfg.backendUrl;

function logLine(cls, msg) {
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = `${new Date().toISOString().slice(11, 23)}  ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(ok, text) {
  statusEl.className = 'status ' + (ok ? 'ok' : 'err');
  statusEl.textContent = text;
}

function saveCfg() {
  cfg.rendererUrl = rendererInput.value.trim();
  cfg.backendUrl = backendInput.value.trim();
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
}

const MOCK_BACKEND = {
  async openChash({ chash }) {
    return {
      text: `[mock] chash:${chash}\n\nThis is a stub response from the host-bridge mock backend. Configure a real backend URL (HTTP sidecar) or replace window.hostBridgeResolver with a custom resolver function to plug into a real nexus daemon.`,
      source: 'mock',
    };
  },
  async runSkill({ name, args }) {
    return { result: `[mock] skill ${name} called with ${JSON.stringify(args)}` };
  },
};

const HTTP_BACKEND = (baseUrl) => ({
  async openChash({ chash }) {
    const resp = await fetch(`${baseUrl}/chash/${encodeURIComponent(chash)}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} from ${baseUrl}/chash/...`);
    return await resp.json();
  },
  async runSkill({ name, args }) {
    const resp = await fetch(`${baseUrl}/skill/${encodeURIComponent(name)}`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(args || {}),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status} from ${baseUrl}/skill/...`);
    return await resp.json();
  },
});

function getBackend() {
  if (window.hostBridgeResolver && typeof window.hostBridgeResolver === 'object') {
    return { backend: window.hostBridgeResolver, label: 'custom' };
  }
  const url = backendInput.value.trim();
  if (!url) return { backend: null, label: 'none' };
  if (url === 'mock') return { backend: MOCK_BACKEND, label: 'mock' };
  if (/^https?:\/\//.test(url)) return { backend: HTTP_BACKEND(url.replace(/\/$/, '')), label: url };
  return { backend: null, label: `invalid: ${url}` };
}

function updateStatus() {
  const { label } = getBackend();
  const banner = document.getElementById('backend-empty-banner');
  if (label === 'none' || label.startsWith('invalid')) {
    setStatus(false, `backend: ${label}`);
    banner.classList.remove('hidden');
  } else {
    setStatus(true, `backend: ${label}`);
    banner.classList.add('hidden');
  }
}

async function handleRequest(m) {
  const { backend, label } = getBackend();
  logLine('req', `→ ${m.method} ${JSON.stringify(m.params).slice(0, 80)}`);

  // Trust-gate (RDR-004 §Item 4 step 7): gate every a2ui.request based on
  // the trust state captured at loadSurface time.
  //
  // Three states matter:
  //   (A) verified + known producer (verifiedActions is a list, possibly empty)
  //       → enforce trust.actions ∩ trustStore[producerId].allowed_actions
  //   (B) verified signature BUT producer not in trust store
  //       (verifiedTrust set, verifiedActions === null)
  //       → bridge-routed methods denied under any policy except "allow";
  //         RDR-004 §Item 5 says "log-only … bridge-routed methods are denied
  //         with a modal explaining the missing-trust state".
  //   (C) unsigned payload (verifiedTrust === null)
  //       → apply default_policy: deny refuses, log-only warns + denies
  //         bridge-routed methods, allow lets everything through.
  const policy = trustStoreDefaultPolicy(loadTrustStore());
  if (verifiedTrust && verifiedActions !== null) {
    // (A) known producer with an action allowlist
    if (!verifiedActions.includes(m.method)) {
      logLine('err', `← trust deny: ${m.method} not in producer's allowlist (${verifiedActions.join(',') || '<empty>'})`);
      frame.contentWindow.postMessage({
        type: 'a2ui.response', requestId: m.requestId,
        error: `Action '${m.method}' not permitted for producer ${verifiedTrust.producerName || verifiedTrust.producerId.slice(0,12)+'…'}`,
      }, '*');
      return;
    }
  } else if (verifiedTrust && verifiedActions === null && policy !== 'allow') {
    // (B) signed by an unknown producer — deny bridge-routed methods unless policy='allow'
    logLine('err', `← trust deny: unknown producer ${verifiedTrust.producerId.slice(0,12)}… (default_policy=${policy})`);
    frame.contentWindow.postMessage({
      type: 'a2ui.response', requestId: m.requestId,
      error: `Action '${m.method}' denied: producer ${verifiedTrust.producerId.slice(0,12)}… is not in the trust store (default_policy=${policy})`,
    }, '*');
    return;
  } else if (verifiedTrust === null && policy === 'deny') {
    // (C) unsigned + deny policy — refuse all bridge-routed methods
    logLine('err', `← trust deny: unsigned payload + default_policy=deny`);
    frame.contentWindow.postMessage({
      type: 'a2ui.response', requestId: m.requestId,
      error: 'Bridge-routed methods denied: no trust signature and default_policy=deny',
    }, '*');
    return;
  } else if (verifiedTrust === null && policy === 'log-only') {
    // (C) unsigned + log-only — deny bridge-routed methods per RDR-004 §Item 7;
    // renderer-local actions (openUrl, copyToClipboard) bypass the bridge so
    // they continue to execute.
    logLine('err', `← trust deny: unsigned payload + default_policy=log-only (bridge-routed methods disabled)`);
    frame.contentWindow.postMessage({
      type: 'a2ui.response', requestId: m.requestId,
      error: `Action '${m.method}' denied: no trust signature (default_policy=log-only — bridge-routed methods disabled)`,
    }, '*');
    return;
  }
  // verifiedTrust === null && policy === 'allow' → fall through (development mode)

  if (!backend) {
    logLine('err', `← no backend configured (${label})`);
    frame.contentWindow.postMessage({
      type: 'a2ui.response', requestId: m.requestId,
      error: `Host bridge has no backend configured. Set backend URL or window.hostBridgeResolver.`,
    }, '*');
    return;
  }

  const handler = backend[m.method];
  if (!handler) {
    logLine('err', `← unknown method: ${m.method}`);
    frame.contentWindow.postMessage({
      type: 'a2ui.response', requestId: m.requestId,
      error: `Unknown method: ${m.method}`,
    }, '*');
    return;
  }

  try {
    const result = await handler(m.params || {});
    logLine('res', `← ${m.method} ${JSON.stringify(result).slice(0, 80)}`);
    frame.contentWindow.postMessage({ type: 'a2ui.response', requestId: m.requestId, result }, '*');
  } catch (err) {
    logLine('err', `← ${m.method} error: ${err.message}`);
    frame.contentWindow.postMessage({
      type: 'a2ui.response', requestId: m.requestId, error: err.message,
    }, '*');
  }
}

window.addEventListener('message', (e) => {
  if (e.source !== frame.contentWindow) return;
  const m = e.data;
  if (!m || typeof m !== 'object') return;

  if (m.type === 'a2ui.request' && m.requestId && m.method) {
    handleRequest(m);
    return;
  }
  if (m.type === 'a2ui.action') {
    logLine('req', `↗ action ${m.action?.name} from ${m.sourceId}`);
    return;
  }
  if (m.type === 'a2ui.openChash') {
    handleRequest({
      type: 'a2ui.request', requestId: `legacy-${Date.now()}`,
      method: 'openChash', params: { chash: m.chash, sourceId: m.sourceId },
    });
    return;
  }
});

document.getElementById('reload').addEventListener('click', () => {
  saveCfg();
  frame.src = rendererInput.value || './index.html';
  updateStatus();
  logLine('req', `reloaded renderer: ${frame.src}`);
});

backendInput.addEventListener('change', () => {
  saveCfg();
  updateStatus();
});

document.getElementById('banner-mock').addEventListener('click', () => {
  backendInput.value = 'mock';
  saveCfg();
  updateStatus();
  logLine('req', 'backend set to mock (stub responses only — not real data)');
});

document.getElementById('banner-focus').addEventListener('click', () => {
  backendInput.focus();
  backendInput.select();
});

updateStatus();
logLine('req', `host bridge ready · renderer: ${frame.src}`);

// Retry-until-ack delivery — implements the discipline specified in
// palinex RDR-001 §Item 6 "Delivery robustness". A caller may invoke
// loadSurface() at any time, including before the inner renderer has
// finished navigating (about:blank race) or after it has already loaded
// (warm-cache race). Queue payloads, deliver on every relevant signal,
// stop retrying when the renderer posts a2ui.ready.
let rendererReady = false;
let pendingLoad = null;
let pendingConfig = null;
let loadRetryTimer = null;
function deliverPending() {
  if (pendingLoad !== null) {
    frame.contentWindow.postMessage({ type: 'a2ui.load', payload: pendingLoad }, '*');
  }
  if (pendingConfig !== null) {
    frame.contentWindow.postMessage({ type: 'a2ui.config', config: pendingConfig }, '*');
  }
}
window.addEventListener('message', (e) => {
  if (e.source === frame.contentWindow && e.data && e.data.type === 'a2ui.ready') {
    rendererReady = true;
    if (loadRetryTimer !== null) { clearInterval(loadRetryTimer); loadRetryTimer = null; }
    deliverPending();
  }
});
frame.addEventListener('load', () => {
  // load event fires for each navigation including the initial src commit
  if (pendingLoad !== null || pendingConfig !== null) deliverPending();
});
function startRetry() {
  if (loadRetryTimer !== null) return;
  let attempts = 0;
  loadRetryTimer = setInterval(() => {
    if (rendererReady) { clearInterval(loadRetryTimer); loadRetryTimer = null; return; }
    deliverPending();
    if (++attempts >= 40) { clearInterval(loadRetryTimer); loadRetryTimer = null; }  // ~6s budget
  }, 150);
}

window.a2uiHostBridge = {
  async loadSurface(payload) {
    // Trust-gate (RDR-004 §Item 4 steps 1-6): verify the payload's
    // signature, cross-check producerId, look up the producer in the
    // local trust store, check freshness, check replay. Outcome stored
    // in verifiedTrust / verifiedActions for use by handleRequest.
    try {
      const r = await trustGateCheck(payload);
      verifiedTrust = r.verified;
      verifiedActions = r.allowedActions;
      if (r.policy === 'deny' && verifiedTrust === null) {
        logLine('err', 'trust: load refused (unsigned + default_policy=deny)');
        return;
      }
    } catch (err) {
      verifiedTrust = null;
      verifiedActions = null;
      logLine('err', `trust: ${err.kind || 'error'} — ${err.message}`);
      return;  // never deliver a payload that failed verification
    }
    pendingLoad = payload;
    if (rendererReady) deliverPending();
    else startRetry();
  },
  setConfig(config) {
    pendingConfig = config;
    if (rendererReady) deliverPending();
    else startRetry();
  },
  setResolver(resolver) {
    window.hostBridgeResolver = resolver;
    updateStatus();
  },
  // Operator helpers — set/clear the trust store from console for testing.
  setTrustStore(store) { localStorage.setItem(TRUST_KEY, JSON.stringify(store)); logLine('req', 'trust store updated'); },
  getTrustStore() { return loadTrustStore(); },
};
</script>
</body>
</html>
