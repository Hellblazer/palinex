name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project and dev deps
        run: uv sync --extra validate --group dev
      - name: Run tests
        run: uv run pytest tests/ -v

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi-release
    permissions:
      id-token: write   # required for OIDC trusted publisher
      contents: write   # required to create GitHub release
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python3 -c '
          import re
          m = re.search(r"^version\s*=\s*\"(.+?)\"", open("pyproject.toml").read(), re.M)
          print(m.group(1) if m else "")
          ')
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: tag '$TAG' does not match pyproject.toml version '$PKG'"
            exit 1
          fi
          echo "Version check passed: $PKG"

      - name: Extract release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python3 - <<EOF > /tmp/release_notes.md
          import re
          tag = "$TAG"
          text = open("CHANGELOG.md").read()
          pattern = rf'## \[{re.escape(tag)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else f"Release {tag}")
          EOF
          echo "--- release notes ---"
          cat /tmp/release_notes.md

      - name: Build wheel and sdist
        run: uv build --sdist --wheel

      - name: Verify mcpb/manifest.json version matches tag (palinex-hg3)
        # Parity check — without this guard a mismatched mcpb manifest would
        # ship an internally inconsistent bundle. Fail loud on drift.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MCPB=$(python3 -c '
          import json
          print(json.load(open("mcpb/manifest.json")).get("version", ""))
          ')
          if [ "$TAG" != "$MCPB" ]; then
            echo "ERROR: tag '$TAG' does not match mcpb/manifest.json version '$MCPB'"
            exit 1
          fi
          echo "mcpb manifest version check passed: $MCPB"

      - name: Set up Node.js for @anthropic-ai/mcpb (palinex-hg3)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build .mcpb bundle (palinex-hg3)
        # palinex ships as a Claude Desktop extension alongside the PyPI
        # package. The .mcpb is a versioned zip carrying manifest.json +
        # pyproject.toml + src/server.py from mcpb/. `npx @anthropic-ai/mcpb`
        # validates manifest.json against the v0.4 schema before zipping.
        # The bundle lives in /tmp so the dist/ directory stays Python-only
        # for the PyPI publish step (which rejects non-Python file types).
        # RDR-003 §Item 3a flagged the lack of automated build; this closes
        # palinex-hg3.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BUNDLE="palinex-${TAG}.mcpb"
          npm install -g @anthropic-ai/mcpb
          mcpb pack mcpb "/tmp/${BUNDLE}"
          ls -la "/tmp/${BUNDLE}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # OIDC trusted publisher — no API token required.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            /tmp/palinex-*.mcpb
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
